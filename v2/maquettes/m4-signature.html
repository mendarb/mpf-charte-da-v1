<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../assets/fonts/satoshi.css">
<style>
  :root{--paper:#FAF8F3;--ink:#0E0E0E;--g500:#6E6E68;--g300:#9B9B95;--font:'Satoshi',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:412px;height:166px;overflow:hidden;background:#FAF8F3;font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{margin:14px;background:#fff;border:1px solid #E7E4DC;height:calc(100% - 28px);display:flex;align-items:center;gap:22px;padding:0 26px}
  .logo{flex:none;border-right:1px solid #E7E4DC;padding-right:22px;display:flex;align-items:center;height:62%}
  .logo img{height:52px;width:auto}
  .id .nm{font-weight:700;font-size:15.5px;letter-spacing:-0.01em}
  .id .rl{font-weight:300;font-size:10px;color:var(--g500);margin-top:2px}
  .id .co{font-weight:400;font-size:9px;line-height:1.7;color:var(--g500);margin-top:9px}
  .id .co a{color:var(--ink);text-decoration:none;font-weight:500}
</style></head>
<body>
<div class="wrap">
  <div class="logo"><img src="../../assets/logo-noir.png" alt="MP Finance"></div>
  <div class="id">
    <div class="nm">Marie Pierrat</div>
    <div class="rl">Courtière · Conseil patrimonial</div>
    <div class="co">+33 6 00 00 00 00 · marie@mp-finance.com<br><a href="#">mp-finance.com</a> · 17 rue Robert Schuman, 57000&nbsp;Metz</div>
  </div>
</div>
</body></html>
