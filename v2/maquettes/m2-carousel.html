<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../assets/fonts/satoshi.css">
<style>
  :root{--paper:#FAF8F3;--ink:#0E0E0E;--g500:#6E6E68;--g300:#9B9B95;--font:'Satoshi',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:968px;height:332px;overflow:hidden;background:transparent;font-family:var(--font);-webkit-font-smoothing:antialiased}
  .row{display:flex;gap:16px;height:100%;padding:6px}
  .panel{flex:1;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(14,14,14,.10)}
  .lbl{font-weight:500;font-size:8px;letter-spacing:.2em;text-transform:uppercase}
  /* P1 — encre + hongrie légère (un seul panneau texturé, retour 12/06) */
  .p1{background:#0E0E0E url('../../assets/textures/tex-hongrie-dark.png') center/cover;color:var(--paper);padding:26px;display:flex;flex-direction:column}
  .p1 .lbl{color:rgba(250,248,243,.6)}
  .p1 .q{margin-top:auto;font-size:21px;line-height:1.3;letter-spacing:-0.015em}
  .p1 .q b{font-weight:700}.p1 .q span{font-weight:300;color:rgba(250,248,243,.55)}
  .p1 .ft{margin-top:22px;display:flex;justify-content:space-between;align-items:flex-end}
  .p1 .ft img{height:24px;width:auto}
  .p1 .ft .lbl{color:rgba(250,248,243,.6);letter-spacing:.14em;text-transform:none;font-size:9px}
  /* P2 — photo */
  .p2 img.ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 55%}
  .p2 .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(14,14,14,0) 35%,rgba(14,14,14,.72) 100%)}
  .p2 .txt{position:absolute;left:24px;right:24px;bottom:22px;color:var(--paper)}
  .p2 .lbl{color:rgba(250,248,243,.75)}
  .p2 .n{font-weight:900;font-size:40px;line-height:1;letter-spacing:-0.02em;margin:6px 0 6px}
  .p2 .d{font-weight:300;font-size:10.5px;line-height:1.45;color:rgba(250,248,243,.85);max-width:30ch}
  /* P3 — papier + hongrie */
  .p3{background:#FAF8F3;color:var(--ink);padding:26px;display:flex;flex-direction:column}
  .p3 .lbl{color:var(--g300)}
  .p3 .t{margin:auto 0;font-size:21px;line-height:1.25;letter-spacing:-0.015em}
  .p3 .t b{font-weight:700}.p3 .t span{font-weight:300;color:var(--g300)}
  .p3 .ft{display:flex;justify-content:space-between;align-items:flex-end}
  .p3 .ft img{height:24px;width:auto}
  .p3 .ft .s{font-weight:500;font-size:9px;letter-spacing:.14em;color:var(--g300)}
</style></head>
<body>
<div class="row">
  <div class="panel p1">
    <span class="lbl">Le mot du courtier</span>
    <div class="q">«&nbsp;<b>Un bon taux,</b> <span>c’est bien.</span><br><b>Le bon conseil,</b> <span>c’est mieux.&nbsp;»</span></div>
    <div class="ft"><img src="../../assets/logo-blanc.png" alt="MP Finance"><span class="lbl">glissez →</span></div>
  </div>
  <div class="panel p2">
    <img class="ph" src="../../assets/ph-signature.jpg" alt="">
    <div class="veil"></div>
    <div class="txt">
      <span class="lbl">Notre force</span>
      <div class="n">30</div>
      <div class="d">banques consultées. Un seul interlocuteur&nbsp;: le&nbsp;vôtre.</div>
    </div>
  </div>
  <div class="panel p3">
    <span class="lbl">Parlons-en</span>
    <div class="t"><b>Votre projet mérite mieux</b><br><span>qu’un guichet.</span></div>
    <div class="ft"><img src="../../assets/logo-noir.png" alt="MP Finance"><span class="s">mp-finance.com</span></div>
  </div>
</div>
</body></html>
